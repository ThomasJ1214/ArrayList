<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArrayList Adventure | Level</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <h1 id="levelHeader">Level</h1>
    <div id="hud">Player: <span id="playerNameLabel">Guest</span> · XP: <span id="xpLabel">0</span></div>
  </header>

  <main class="container level-layout">
    <section class="panel level-main">
      <p id="learnText"></p>

      <section>
        <h3>Try it yourself</h3>
        <textarea id="codeBox" rows="6" placeholder="Type your Java snippet..."></textarea>
        <button id="runCode" class="button">Check Code</button>
        <p id="codeFeedback" class="info-text"></p>
      </section>

      <section>
        <h3>Drag-drop coding puzzle</h3>
        <div id="puzzleBank" class="token-row"></div>
        <div id="puzzleSlots" class="slot-row"></div>
        <button id="checkPuzzle" class="button alt">Check Puzzle</button>
        <p id="puzzleFeedback" class="info-text"></p>
      </section>

      <section>
        <h3>Mini game</h3>
        <p id="miniGamePrompt"></p>
        <div id="miniGameOptions"></div>
        <p id="miniGameFeedback" class="info-text"></p>
      </section>

      <section>
        <h3>Quiz</h3>
        <p id="quizQuestion"></p>
        <div id="quizOptions"></div>
        <p id="quizFeedback" class="info-text"></p>
      </section>

      <section id="bossBattle" class="hidden">
        <h3>Boss Battle</h3>
        <p><strong id="bossName"></strong> HP: <span id="bossHp"></span></p>
        <p id="bossPrompt"></p>
        <div id="bossOptions"></div>
        <p id="bossFeedback" class="info-text"></p>
      </section>
    </section>

    <aside class="panel level-side">
      <h3>Level Actions</h3>
      <button id="returnMap" class="button">Return to Map</button>
      <button id="saveGame" class="button alt">Save Progress</button>
      <p class="info-text">Map movement is disabled here to prevent conflicts.</p>
    </aside>
  </main>

  <script src="data/levels.js"></script>
  <script src="js/level.js"></script>
</body>
</html>
